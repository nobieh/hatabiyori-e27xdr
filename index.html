<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3f7d3b">
<meta name="robots" content="noindex, nofollow">
<title>畑日和（はたけびより）</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
/* ============================================================
   畑日和 v2 — デザイントークン
   土・畝・若葉・実り・空。因島の畑の色をそのまま借りる。
   ============================================================ */
:root{
  --soil:#4a3b2a;        /* 土: 基本の文字色 */
  --paper:#f6f1e3;       /* 畝: 背景 */
  --card:#fffdf6;        /* カード地 */
  --leaf:#3f7d3b;        /* 若葉: 主ボタン */
  --leaf-deep:#2c5a2a;   /* 濃緑: 押下・強調 */
  --accent:#d4622a;      /* 実り(柿色): 収穫まわり */
  --sky:#e3eef5;         /* 空: 天気カード */
  --line:#e3dbc8;        /* 罫線 */
  --muted:#8a7d66;       /* 補助文字 */
  --danger:#b3402e;
  --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP","Meiryo",sans-serif;
  font-size:18px;line-height:1.7;color:var(--soil);background:var(--paper);
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
}
button{font-family:inherit;}
:focus-visible{outline:3px solid var(--leaf);outline-offset:2px;border-radius:8px;}

/* ---- 時刻でうつろう空（v1から受け継ぐ看板） ---- */
.sky{
  position:relative;
  color:#fff;padding:22px 18px 18px;border-radius:0 0 22px 22px;
  text-shadow:0 1px 3px rgba(20,30,20,.35);
  transition:background 1.2s ease;
}
.sky .sekki{
  position:absolute;top:18px;right:14px;font-size:13px;font-weight:700;letter-spacing:.1em;
  background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.45);border-radius:999px;padding:3px 12px;
}
.sky[data-tod="morning"]{background:linear-gradient(160deg,#f7c873 0%,#e89a5f 35%,#8fb8d8 100%);}
.sky[data-tod="day"]    {background:linear-gradient(160deg,#6fa8dc 0%,#8fc1e9 55%,#bcd9ee 100%);}
.sky[data-tod="evening"]{background:linear-gradient(160deg,#f2955e 0%,#c76a7a 55%,#7e6aa8 100%);}
.sky[data-tod="night"]  {background:linear-gradient(160deg,#263a5e 0%,#16233f 60%,#0e1a33 100%);}
.sky .date{font-size:15px;opacity:.95;}
.sky .greet{font-size:22px;font-weight:700;letter-spacing:.04em;margin-top:2px;}

.wrap{padding:14px 14px 0;max-width:640px;margin:0 auto;}

/* ---- カード ---- */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(74,59,42,.06);
}
.card h2{font-size:17px;margin:0 0 10px;color:var(--leaf-deep);letter-spacing:.06em;}
.card h2 .n{color:var(--muted);font-weight:600;font-size:14px;margin-left:6px;}

/* ---- 天気 ---- */
.weather{background:var(--sky);border-color:#cfe0ec;}
.weather .today{display:flex;align-items:center;gap:12px;}
.weather .emoji{font-size:44px;line-height:1;}
.weather .t{font-size:20px;font-weight:700;}
.weather .sub{font-size:14px;color:#4a5b6a;}
.weather .hint{margin-top:8px;font-size:15px;background:#fffdf6;border-radius:10px;padding:8px 10px;}

/* ---- お知らせ帯 ---- */
.banner{border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:15px;display:flex;gap:10px;align-items:center;}
.banner.warn{background:#fdeedd;border:1px solid #ecc9a3;color:#7a4a1c;}
.banner.danger{background:#fbe3de;border:1px solid #e5ab9f;color:var(--danger);}
.banner button{margin-left:auto;flex:none;}

/* ---- 作業リスト ---- */
.task{display:flex;align-items:center;gap:12px;min-height:58px;padding:8px 4px;border-top:1px solid var(--line);}
.task:first-of-type{border-top:none;}
.task .chk{
  flex:none;width:32px;height:32px;border-radius:50%;border:2.5px solid var(--leaf);
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;padding:0;cursor:pointer;
}
.task.done .chk{background:var(--leaf);border-color:var(--leaf);}
.task .body{flex:1;min-width:0;}
.task .crop{font-size:14px;color:var(--muted);}
.task .label{font-size:19px;font-weight:600;}
.task.done .label{color:var(--muted);text-decoration:line-through;font-weight:500;}
.task .tag{flex:none;font-size:13px;border-radius:999px;padding:2px 10px;background:#eef3e9;color:var(--leaf-deep);}
.task .tag.harvest{background:#fbe8db;color:var(--accent);}
.alldone{display:flex;align-items:center;gap:10px;padding:12px 4px;color:var(--leaf-deep);font-weight:700;font-size:18px;}
.empty{color:var(--muted);font-size:16px;padding:6px 2px;}

/* ---- ボタン ---- */
.btn{
  display:block;width:100%;min-height:56px;border:none;border-radius:14px;
  background:var(--leaf);color:#fff;font-size:18px;font-weight:700;letter-spacing:.05em;
  padding:12px 16px;cursor:pointer;
}
.btn:active{background:var(--leaf-deep);}
.btn.ghost{background:var(--card);color:var(--leaf-deep);border:2px solid var(--leaf);}
.btn.accent{background:var(--accent);}
.btn.accent:active{background:#b04e1e;}
.btn.gray{background:#efe9da;color:var(--soil);}
.btn.danger{background:#fff;color:var(--danger);border:2px solid var(--danger);}
.btn.small{min-height:44px;font-size:15px;width:auto;display:inline-block;padding:8px 14px;}
.btnrow{display:flex;gap:10px;}
.btnrow .btn{flex:1;}
.stack>*{margin-bottom:10px;}

/* ---- タブバー ---- */
.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  display:flex;background:var(--card);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tabs button{
  flex:1;min-height:64px;border:none;background:none;cursor:pointer;
  font-size:12.5px;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.tabs button .ic{font-size:24px;line-height:1;}
.tabs button.on{color:var(--leaf-deep);font-weight:700;}
.tabs button.on .ic{transform:scale(1.12);}

/* ---- こよみ ---- */
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.calhead .ym{font-size:19px;font-weight:700;}
.calhead button{min-width:52px;min-height:44px;font-size:20px;border:1px solid var(--line);background:var(--card);border-radius:10px;cursor:pointer;color:var(--leaf-deep);}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.calgrid .dow{text-align:center;font-size:13px;color:var(--muted);padding:2px 0;}
.calgrid .dow.sun{color:#c05b4a;} .calgrid .dow.sat{color:#4a6fa8;}
.day{
  min-height:52px;border-radius:10px;border:1px solid transparent;background:none;
  display:flex;flex-direction:column;align-items:center;padding:4px 0 2px;cursor:pointer;font-size:16px;color:var(--soil);
}
.day.othermonth{color:#c9bfa9;}
.day.today{border-color:var(--leaf);background:#eef3e9;font-weight:700;}
.day.sel{background:var(--leaf);color:#fff;}
.day .dots{display:flex;gap:2px;margin-top:2px;height:6px;}
.day .dots i{width:6px;height:6px;border-radius:50%;background:var(--leaf);}
.day.sel .dots i{background:#fff;}
.day .dots i.harvest{background:var(--accent);}

/* ---- 作物カード ---- */
.crop-item{display:flex;gap:12px;align-items:center;padding:10px 2px;border-top:1px solid var(--line);cursor:pointer;background:none;border-left:none;border-right:none;border-bottom:none;width:100%;text-align:left;font-size:inherit;color:inherit;}
.crop-item:first-of-type{border-top:none;}
.thumb{flex:none;width:72px;height:72px;border-radius:14px;background:#eef3e9;display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.crop-item .name{font-size:20px;font-weight:700;}
.crop-item .meta{font-size:14px;color:var(--muted);}
.badge{display:inline-block;font-size:13px;font-weight:700;border-radius:999px;padding:2px 10px;background:#fbe8db;color:var(--accent);margin-left:6px;vertical-align:middle;}

/* ---- 記録グラフ ---- */
.chart{display:flex;align-items:flex-end;gap:5px;height:150px;padding:8px 2px 0;}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.chart .bar{width:100%;max-width:34px;background:var(--leaf);border-radius:6px 6px 0 0;min-height:2px;}
.chart .col.now .bar{background:var(--accent);}
.chart .v{font-size:11px;color:var(--muted);}
.chart .m{font-size:12px;color:var(--muted);margin-top:3px;}
.totals{border-top:1px solid var(--line);margin-top:12px;padding-top:8px;font-size:16px;}
.totals div{display:flex;justify-content:space-between;padding:4px 0;}

/* ---- 入力・モーダル ---- */
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font-size:18px;font-family:inherit;padding:12px;border:1.5px solid var(--line);
  border-radius:12px;background:#fff;color:var(--soil);
}
textarea{min-height:96px;line-height:1.6;}
label.f{display:block;font-size:14px;color:var(--muted);margin:12px 0 4px;}
.overlay{position:fixed;inset:0;background:rgba(40,30,15,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.sheet{
  background:var(--paper);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
  border-radius:22px 22px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));
}
.sheet h3{margin:0 0 6px;font-size:20px;color:var(--leaf-deep);}
.sheet .close{position:sticky;top:0;float:right;min-width:44px;min-height:44px;border:none;background:#efe9da;border-radius:50%;font-size:18px;cursor:pointer;}
.bigphoto{width:100%;border-radius:14px;margin:8px 0;}
.evlist{font-size:16px;}
.evlist div{padding:6px 0;border-top:1px dashed var(--line);}
.evlist div:first-child{border-top:none;}
.note{font-size:14px;color:var(--muted);}
.kv{display:flex;justify-content:space-between;font-size:16px;padding:6px 0;border-top:1px dashed var(--line);}
.toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));
  background:var(--soil);color:#fff;font-size:16px;padding:10px 18px;border-radius:999px;z-index:200;
  box-shadow:0 4px 14px rgba(0,0,0,.25);max-width:90%;
}
.ver{text-align:center;font-size:13px;color:var(--muted);padding:8px 0 20px;}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>

<!-- ============================================================
     コアロジック（UIと分離。将来の移植・テストがしやすいように）
     ============================================================ -->
<script id="hb-core">
"use strict";
var HB = {};
HB.VERSION = "2.6.0";
HB.KEY = "hatabiyori:v2";
/* 天気の観測地点。引っ越したらここを変えるだけ。 */
HB.LOC = { name: "因島", lat: 34.30, lon: 133.19 };

/* ---------- 日付ユーティリティ ---------- */
function ymd(d){
  var y=d.getFullYear(), m=("0"+(d.getMonth()+1)).slice(-2), dd=("0"+d.getDate()).slice(-2);
  return y+"-"+m+"-"+dd;
}
function parseYmd(s){ var p=s.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
function daysBetween(a,b){ return Math.round((parseYmd(b)-parseYmd(a))/86400000); }
function addDays(s,n){ var d=parseYmd(s); d.setDate(d.getDate()+n); return ymd(d); }
function jpDate(s){ var d=parseYmd(s); return (d.getMonth()+1)+"月"+d.getDate()+"日("+"日月火水木金土"[d.getDay()]+")"; }
function jpDateShort(s){ var d=parseYmd(s); return (d.getMonth()+1)+"/"+d.getDate(); }
HB.ymd=ymd; HB.parseYmd=parseYmd; HB.daysBetween=daysBetween; HB.addDays=addDays; HB.jpDate=jpDate; HB.jpDateShort=jpDateShort;

/* ---------- 時刻 → 空の色と挨拶 ---------- */
HB.timeOfDay = function(h){
  if(h>=5 && h<10) return "morning";
  if(h>=10 && h<16) return "day";
  if(h>=16 && h<19) return "evening";
  return "night";
};
HB.greeting = function(tod){
  return {
    morning:"おはようございます、今日も良い畑日和を。",
    day:"こんにちは、畑の見回り日和です。",
    evening:"こんばんは、今日もおつかれさまでした。",
    night:"こんばんは、明日の畑も楽しみですね。"
  }[tod];
};

/* ---------- 二十四節気(近似日付・v1から移植) ---------- */
HB.SEKKI = [
  [1,5,"小寒"],[1,20,"大寒"],[2,4,"立春"],[2,19,"雨水"],[3,5,"啓蟄"],[3,20,"春分"],
  [4,4,"清明"],[4,20,"穀雨"],[5,5,"立夏"],[5,21,"小満"],[6,5,"芒種"],[6,21,"夏至"],
  [7,7,"小暑"],[7,22,"大暑"],[8,7,"立秋"],[8,23,"処暑"],[9,7,"白露"],[9,23,"秋分"],
  [10,8,"寒露"],[10,23,"霜降"],[11,7,"立冬"],[11,22,"小雪"],[12,7,"大雪"],[12,21,"冬至"]
];
HB.sekki = function(d){
  var md = (d.getMonth()+1)*100 + d.getDate();
  var cur = "冬至";
  for(var i=0;i<HB.SEKKI.length;i++){ var s=HB.SEKKI[i]; if(md >= s[0]*100+s[1]) cur = s[2]; }
  return cur;
};

/* ---------- 保存（localStorage） ---------- */
HB.storageOK = (function(){
  try{
    if(typeof localStorage==="undefined") return false;
    localStorage.setItem("__hb_test","1"); localStorage.removeItem("__hb_test");
    return true;
  }catch(e){ return false; }
})();
HB.syncDefaults = function(){
  return { url:"", token:"", auto:true, mode:"send", lastSync:null, lastError:null, sentHarvestIds:[], lastDailyLogDate:null };
};
/* 旧データに新しい項目を足す(何度呼んでも安全・こわさない)。
   Drive同期の設定(sync)と、株ごとの追加項目(株数・そだち・メモ・じぶん予定・今季おわり)の
   両方をここで補う。既存の値は一切書き換えない。 */
HB.migrate = function(s){
  if(!s) return s;
  s.crops = s.crops || []; s.done = s.done || {}; s.harvests = s.harvests || [];
  s.settings = s.settings || {}; s.meta = s.meta || {};
  if(s.settings.sound === undefined) s.settings.sound = true;
  if(!("lastBackup" in s.settings)) s.settings.lastBackup = null;
  s.settings.sync = Object.assign(HB.syncDefaults(), s.settings.sync || {});
  if(!Array.isArray(s.settings.sync.sentHarvestIds)) s.settings.sync.sentHarvestIds = [];
  s.crops.forEach(function(c){
    if(c.count == null) c.count = 1;
    if(!c.maturity) c.maturity = "normal";
    if(!c.notes) c.notes = [];
    if(!c.custom) c.custom = [];
    if(c.closed == null) c.closed = false;
    if(c.memo && c.notes.length === 0){
      c.notes.push({ id:"m-"+c.id, date: ymd(new Date()), text: c.memo });
      c.memo = "";
    }
  });
  return s;
};
HB.defaultState = function(){
  return { crops:[], done:{}, harvests:[], settings:{ sound:true, lastBackup:null, sync:HB.syncDefaults() }, meta:{ created:new Date().toISOString() } };
};
HB.load = function(){
  if(!HB.storageOK) return null;
  try{ var r=localStorage.getItem(HB.KEY); return r? HB.migrate(JSON.parse(r)) : null; }
  catch(e){ return null; }
};
HB.saveNow = function(state){
  if(!HB.storageOK) return { ok:false, reason:"nostorage" };
  try{ localStorage.setItem(HB.KEY, JSON.stringify(state)); return { ok:true }; }
  catch(e){ return { ok:false, reason:"quota" }; }
};
HB._t = null;
HB.saveDebounced = function(state, onFail){
  if(HB._t) clearTimeout(HB._t);
  HB._t = setTimeout(function(){
    var r = HB.saveNow(state);
    if(!r.ok && onFail) onFail(r);
  }, 500);
};

/* ---------- 効果音（その場で合成・ファイル不要） ---------- */
HB.sound = {
  ctx:null, on:true,
  ensure:function(){
    if(typeof window==="undefined") return;
    if(!this.ctx){
      try{ this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    }
    if(this.ctx && this.ctx.state==="suspended"){ try{ this.ctx.resume(); }catch(e){} }
  },
  tone:function(f,t0,dur,type,vol){
    var c=this.ctx; if(!c) return;
    var o=c.createOscillator(), g=c.createGain();
    o.type=type||"sine"; o.frequency.value=f;
    g.gain.setValueAtTime(vol||0.16, c.currentTime+t0);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+t0+dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime+t0); o.stop(c.currentTime+t0+dur+0.03);
  },
  play:function(name){
    if(!this.on) return;
    this.ensure(); if(!this.ctx) return;
    if(name==="done"){ this.tone(520,0,0.09,"triangle",0.2); }
    else if(name==="alldone"){
      var self=this; [660,784,988].forEach(function(f,i){ self.tone(f,i*0.12,0.18,"triangle",0.16); });
      this.tone(1319,0.36,0.4,"sine",0.13);
    }
    else if(name==="harvest"){ var s=this; [880,1175,1568].forEach(function(f,i){ s.tone(f,i*0.05,0.12,"sine",0.12); }); }
    else if(name==="pon"){ this.tone(392,0,0.13,"sine",0.2); }
  }
};
</script>

    ],

};
HB.CATS = ["実もの","葉もの","根もの","いも・豆","花・その他"];
HB.DBKEYS = Object.keys(HB.DB);

/* ---------- 予定づくり ---------- */
/* そだち(熟期): 早生は予定が早めに、晩生は遅めに来る(v1の機能を移植) */
HB.factorOf = function(c){
  return c.maturity === "early" ? 0.85 : c.maturity === "late" ? 1.15 : 1;
};
HB.tasksForDate = function(state, dateStr){
  var list = [];
  var d = parseYmd(dateStr);
  state.crops.forEach(function(c){
    if(c.closed) return; /* 今季おわりの株は予定を止める */
    var t = HB.DB[c.key]; if(!t) return;
    var f = HB.factorOf(c);
    var age = daysBetween(c.planted, dateStr);
    function push(label, kind, pre){
      list.push({ cropId:c.id, cropName:c.name, label:label, kind:kind, key:c.id+"|"+dateStr+"|"+(pre||"")+label });
    }
    if(age >= 0){
      var hFrom = t.harvest ? Math.round(t.harvest.from * f) : null;
      var hTo   = t.harvest ? Math.round(t.harvest.to   * f) : null;
      var wEnd = t.harvest ? (hTo + 14) : 3650;
      var wSeason = !t.waterMonths || t.waterMonths.indexOf(d.getMonth()+1) >= 0;
      if(t.water && wSeason && age > 0 && age % t.water === 0 && age <= wEnd) push("水やり","water");
      (t.events||[]).forEach(function(e){ if(Math.round(e.d * f) === age) push(e.label,"event"); });
      if(t.harvest && age === hFrom) push(t.harvest.label || "収穫をはじめられます","harvest");
    }
    (t.annual||[]).forEach(function(e){
      if(d.getMonth()+1 === e.m && d.getDate() === e.d) push(e.label,"event");
    });
    (c.custom||[]).forEach(function(e){
      if(e.date === dateStr) push(e.label,"custom","じぶん::");
    });
  });
  return list;
};
HB.isHarvestTime = function(crop, dateStr){
  var t = HB.DB[crop.key]; if(!t || !t.harvest || crop.closed) return false;
  var f = HB.factorOf(crop);
  var age = daysBetween(crop.planted, dateStr);
  return age >= Math.round(t.harvest.from * f) && age <= Math.round(t.harvest.to * f);
};
/* 開かなかった日の作業をひろう「やり残し」(水やりは除く・未完了だけ) */
HB.overdueTasks = function(state, todayStr, days){
  days = days || 14;
  var out = [];
  for(var i = days; i >= 1; i--){
    var ds = addDays(todayStr, -i);
    HB.tasksForDate(state, ds).forEach(function(t){
      if(t.kind === "water") return;
      if(state.done[t.key]) return;
      out.push(Object.assign({ date: ds }, t));
    });
  }
  return out;
};
/* 育ち具合で変わる絵文字(写真がないときのサムネ・v1の名物) */
HB.stageEmoji = function(c, todayStr){
  var t = HB.DB[c.key]; if(!t) return "🌱";
  if(t.annual || c.closed) return t.emoji;
  var age = daysBetween(c.planted, todayStr);
  var goal = t.harvest ? Math.round(t.harvest.from * HB.factorOf(c)) : 60;
  if(age < 0) return "🌰";
  if(age < goal * 0.34) return "🌱";
  if(age < goal * 0.75) return "🌿";
  return t.emoji;
};
/* (データ移行は hb-core の HB.migrate に統合済み) */
HB.upcoming = function(state, fromDate, days, cropId){
  var out = [];
  for(var i=1;i<=days;i++){
    var ds = addDays(fromDate, i);
    HB.tasksForDate(state, ds).forEach(function(t){
      if(t.kind === "water") return;
      if(cropId && t.cropId !== cropId) return;
      out.push({ date:ds, label:t.label, cropName:t.cropName });
    });
  }
  return out;
};

/* ---------- ChatGPTへ渡す「データ要約」 ---------- */
HB.buildDigest = function(state, todayStr, weatherLine){
  var L = [];
  var d = parseYmd(todayStr);
  L.push("【畑日和 データ要約】" + d.getFullYear() + "年" + (d.getMonth()+1) + "月" + d.getDate() + "日時点");
  L.push("■ 場所: 広島県・因島(瀬戸内の島。温暖)");
  if(weatherLine) L.push("■ 今日の天気: " + weatherLine);
  L.push("");
  var act = state.crops.filter(function(c){ return !c.closed; });
  L.push("■ 育てている作物(" + act.length + "件):");
  if(act.length === 0) L.push("・(まだ登録なし)");
  act.forEach(function(c){
    var t = HB.DB[c.key] || {};
    var age = daysBetween(c.planted, todayStr);
    var s = "・" + c.name +
            ((c.count||1) > 1 ? "(" + c.count + "株)" : "") +
            (c.maturity === "early" ? "(早生)" : c.maturity === "late" ? "(晩生)" : "") +
            " — " + jpDate(c.planted) + (t.basis||"植え付け") + "(" + age + "日目)";
    if(HB.isHarvestTime(c, todayStr)) s += " / いま収穫どき";
    var ns = (c.notes||[]).slice(0,2).map(function(n){ return jpDateShort(n.date) + " " + n.text.replace(/\n/g," "); });
    if(c.memo) ns.push(c.memo.replace(/\n/g, " "));
    if(ns.length) s += " / メモ: " + ns.join(" / ");
    L.push(s);
  });
  L.push("");
  L.push("■ 今日の作業:");
  var tasks = HB.tasksForDate(state, todayStr);
  if(tasks.length === 0) L.push("・(予定なし)");
  tasks.forEach(function(t){
    L.push("・[" + (state.done[t.key] ? "済" : "未") + "] " + t.cropName + ": " + t.label);
  });
  L.push("");
  L.push("■ やり残しの作業(この2週間):");
  var od = HB.overdueTasks(state, todayStr, 14);
  if(od.length === 0) L.push("・(なし)");
  od.forEach(function(t){ L.push("・" + jpDateShort(t.date) + " " + t.cropName + ": " + t.label); });
  L.push("");
  L.push("■ 今後7日の予定(水やり以外):");
  var up = HB.upcoming(state, todayStr, 7);
  if(up.length === 0) L.push("・(なし)");
  up.forEach(function(u){ L.push("・" + jpDateShort(u.date) + " " + u.cropName + ": " + u.label); });
  L.push("");
  L.push("■ 最近の収穫(直近5件):");
  var hs = state.harvests.slice(-5).reverse();
  if(hs.length === 0) L.push("・(記録なし)");
  hs.forEach(function(h){ L.push("・" + jpDateShort(h.date) + " " + h.cropName + " " + h.qty + h.unit); });
  L.push("");
  L.push("---");
  L.push("上のデータをふまえて、今日の畑作業のアドバイスや注意点をやさしい言葉で教えてください。");
  return L.join("\n");
};

/* ---------- Drive自動保存(Apps Script受付係へ送るデータ作り) ---------- */
HB.stripForSync = function(state){
  return {
    crops: state.crops.map(function(c){
      return { id:c.id, key:c.key, name:c.name, planted:c.planted, memo:c.memo || "",
               count:c.count || 1, maturity:c.maturity || "normal",
               notes:c.notes || [], custom:c.custom || [], closed:!!c.closed,
               hasPhoto: !!c.photo };
    }),
    done: state.done,
    harvests: state.harvests,
    tasks: state.tasks || [],
    calImported: state.calImported || {},
    settings: { sound: state.settings.sound, lastBackup: state.settings.lastBackup },
    meta: state.meta
  };
};
HB.buildSyncPayload = function(state, weather, todayStr){
  var sy = (state.settings && state.settings.sync) || {};
  var sent = sy.sentHarvestIds || [];
  var newHs = state.harvests.filter(function(h){ return sent.indexOf(h.id) < 0; });
  var rows = newHs.map(function(h){
    var c = null;
    for(var i = 0; i < state.crops.length; i++){ if(state.crops[i].id === h.cropId) c = state.crops[i]; }
    return [h.id, h.date, h.cropName, h.qty, h.unit, c ? daysBetween(c.planted, h.date) : ""];
  });
  var w = null;
  if(weather && weather.daily){
    var d = weather.daily;
    w = { label: HB.wmo(d.weather_code[0]).label,
          tmax: Math.round(d.temperature_2m_max[0]),
          tmin: Math.round(d.temperature_2m_min[0]),
          pp: d.precipitation_probability_max ? d.precipitation_probability_max[0] : "" };
  }
  var dailyRow = null;
  if(sy.lastDailyLogDate !== todayStr){
    var tasks = HB.tasksForDate(state, todayStr);
    var doneN = tasks.filter(function(t){ return !!state.done[t.key]; }).length;
    dailyRow = [todayStr, w ? w.label : "", w ? w.tmax : "", w ? w.tmin : "", w ? w.pp : "", tasks.length, doneN];
  }
  var wline = w ? (w.label + " 最高" + w.tmax + "℃/最低" + w.tmin + "℃" + (w.pp !== "" && w.pp != null ? " 降水確率" + w.pp + "%" : "")) : null;
  return {
    payload: { token: sy.token || "", app: "hatabiyori", version: HB.VERSION, sentAt: new Date().toISOString(),
               snapshot: HB.stripForSync(state), digest: HB.buildDigest(state, todayStr, wline),
               harvestRows: rows, dailyRow: dailyRow },
    sentIds: newHs.map(function(h){ return h.id; }),
    dailyDate: dailyRow ? todayStr : null
  };
};
/* ---------- Driveからの受け取り(端末=窓、Drive=親玉) ---------- */
HB.mergePulled = function(localState, pulledData){
  var merged = HB.migrate(JSON.parse(JSON.stringify(pulledData)));
  /* 写真はDriveに置かないので、同じidの作物はこの端末の写真を残す */
  merged.crops = merged.crops.map(function(c){
    var old = null;
    for(var i = 0; i < localState.crops.length; i++){
      if(localState.crops[i].id === c.id) old = localState.crops[i];
    }
    if(old && old.photo && !c.photo) c = Object.assign({}, c, { photo: old.photo });
    return c;
  });
  /* この端末の接続設定(URL・あいことば・役わり)はこの端末のまま */
  merged.settings.sync = Object.assign({}, localState.settings.sync);
  return merged;
};
/* ---------- 設定リンク(#setup=…)の作成と読み取り ---------- */
HB.encodeSetup = function(sync){
  var o = { url: sync.url || "", token: sync.token || "", mode: sync.mode || "send" };
  return encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(o)))));
};
HB.decodeSetup = function(hash){
  try{
    var m = /#setup=([^&]+)/.exec(hash || "");
    if(!m) return null;
    var o = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(m[1])))));
    if(o && o.url) return { url: String(o.url), token: String(o.token || ""), mode: (o.mode === "receive" ? "receive" : "send") };
  }catch(e){}
  return null;
};

/* ---------- 自動化タスク用テキスト(予定表つき) ---------- */
HB.buildAutomationText = function(state, todayStr, days){
  days = days || 90;
  var L = [HB.buildDigest(state, todayStr, null), "", "■ 今後" + days + "日の予定表(水やり以外):"];
  var up = HB.upcoming(state, todayStr, days);
  if(up.length === 0) L.push("・(なし)");
  up.forEach(function(u){ L.push("・" + u.date + " " + u.cropName + ": " + u.label); });
  L.push("");
  L.push("この予定表をもとに、毎朝その日の畑仕事をやさしい言葉で知らせてください。");
  return L.join("\n");
};

/* ---------- バックアップの書き出し・読み込み ---------- */
HB.exportData = function(state){
  return { app:"hatabiyori", version:2, exportedAt:new Date().toISOString(), data:state };
};
HB.backupFilename = function(){
  return "hatabiyori_backup_" + ymd(new Date()).replace(/-/g,"") + ".json";
};
HB.parseImport = function(text){
  var o;
  try{ o = JSON.parse(text); }catch(e){ return { ok:false, error:"notjson" }; }
  if(o && o.app === "hatabiyori" && o.data && o.data.crops){
    return { ok:true, state: HB.migrate(o.data) };
  }
  /* 旧・畑日和(Claude版)などの別形式 → 中身は捨てずに預かる */
  return { ok:false, error:"legacy", raw:o };
};

/* ---------- 天気(Open-Meteo・無料/鍵不要) ---------- */
HB.wmo = function(code){
  function r(l,e){ return { label:l, emoji:e }; }
  if(code === 0) return r("快晴","☀️");
  if(code === 1 || code === 2) return r("晴れ","🌤️");
  if(code === 3) return r("くもり","☁️");
  if(code === 45 || code === 48) return r("きり","🌫️");
  if(code >= 51 && code <= 57) return r("きりさめ","🌦️");
  if(code >= 61 && code <= 67) return r("雨","🌧️");
  if(code >= 71 && code <= 77) return r("雪","❄️");
  if(code >= 80 && code <= 82) return r("にわか雨","🌦️");
  if(code === 85 || code === 86) return r("雪","❄️");
  if(code >= 95) return r("かみなり","⛈️");
  return r("−","🌱");
};
HB.fetchWeather = function(){
  var u = "https://api.open-meteo.com/v1/forecast?latitude=" + HB.LOC.lat +
          "&longitude=" + HB.LOC.lon +
          "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max" +
          "&timezone=Asia%2FTokyo&forecast_days=3";
  return fetch(u).then(function(r){ if(!r.ok) throw new Error("weather"); return r.json(); });
};

/* ---------- 写真の縮小(容量をやさしく) ---------- */
HB.compressImage = function(file, maxSide, quality){
  maxSide = maxSide || 640; quality = quality || 0.6;
  return new Promise(function(res, rej){
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function(){
      var s = Math.min(1, maxSide / Math.max(img.width, img.height));
      var cv = document.createElement("canvas");
      cv.width = Math.round(img.width * s); cv.height = Math.round(img.height * s);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      URL.revokeObjectURL(url);
      res(cv.toDataURL("image/jpeg", quality));
    };
    img.onerror = rej;
    img.src = url;
  });
};

if(typeof module !== "undefined" && module.exports){ module.exports = HB; }
</script>

<script id="hb-cal">
"use strict";
/* ---------- カレンダー連携+じぶんの予定(独立)モジュール ----------
   ・受付係v1.3の農業予定を予定エンジンに合流(📆)。写し取り込み後は元をかくす。
   ・作物にひもづかない「じぶんの予定」state.tasks を新設(編集・削除可)。
   ・既存コードは無改変: HB.migrate と HB.tasksForDate をラップ。 */
(function(){
  var _migrate = HB.migrate;
  HB.migrate = function(s){
    s = _migrate(s);
    if(!s) return s;
    s.calCache = s.calCache || { at: null, events: [] };
    s.tasks = s.tasks || [];
    s.calImported = s.calImported || {};
    if(s.settings && s.settings.sync && s.settings.sync.calendar === undefined){
      s.settings.sync.calendar = true;
    }
    return s;
  };
  var _tasksForDate = HB.tasksForDate;
  HB.tasksForDate = function(state, dateStr){
    var list = _tasksForDate(state, dateStr);
    (state.tasks || []).forEach(function(tk){
      if(tk.date !== dateStr || !tk.label) return;
      list.push({ cropId: "task:" + tk.id, cropName: "\ud83d\udcdd じぶんの予定",
                  label: tk.label, kind: "custom", taskId: tk.id, date: tk.date, memo: tk.memo || "",
                  key: "task:" + tk.id + "|" + dateStr + "|task" });
    });
    var cc = state.calCache;
    var on = !(state.settings && state.settings.sync && state.settings.sync.calendar === false);
    if(on && cc && cc.events){
      cc.events.forEach(function(ev){
        if(ev.date !== dateStr) return;
        if(state.calImported && state.calImported[ev.id]) return;
        var label = (ev.time ? ev.time + " " : "") + ev.title;
        list.push({ cropId: "cal:" + ev.id, cropName: "カレンダーの予定",
                    label: label, kind: "cal", evId: ev.id, date: ev.date, memo: ev.memo || "",
                    key: "cal:" + ev.id + "|" + dateStr + "|" + label });
      });
    }
    return list;
  };
})();
</script>

<script type="text/babel" data-presets="react" id="hb-ui">
const { useState, useEffect, useRef, useMemo } = React;

/* 1分ごとに時刻を更新(空の色・日付またぎ用) */
function useNow(){
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 60000); return () => clearInterval(t); }, []);
  return now;
}

function Toast({ msg }){ return msg ? <div className="toast">{msg}</div> : null; }

function Sky({ now }){

function WeatherCard({ weather, error }){
  if(error) return (

      <div className="note">いま天気を取得できませんでした。電波のあるところで開き直すと表示されます。</div>
    </section>
  );
  if(!weather || !weather.daily) return (
    <section className="card weather"><h2>きょうの天気</h2><div className="note">読み込み中…</div></section>
  );
  const d = weather.daily;
  const w0 = HB.wmo(d.weather_code[0]);
  const w1 = HB.wmo(d.weather_code[1]);
  const rain = d.precipitation_probability_max ? d.precipitation_probability_max[0] : null;
  return (
    <section className="card weather">
      <h2>きょうの天気（{HB.LOC.name}）</h2>
      <div className="today">
        <div className="emoji">{w0.emoji}</div>
        <div>
          <div className="t">{w0.label}　{Math.round(d.temperature_2m_max[0])}℃ / {Math.round(d.temperature_2m_min[0])}℃</div>
          <div className="sub">
            {rain != null ? "降水確率 " + rain + "%　" : ""}
            あす: {w1.emoji}{w1.label} {Math.round(d.temperature_2m_max[1])}℃
          </div>
        </div>
      </div>
      {rain != null && rain >= 60 &&
        <div className="hint">☔ 雨の予報です。今日の水やりはお休みでも大丈夫そうです。</div>}
      {rain != null && rain < 20 && Math.round(d.temperature_2m_max[0]) >= 30 &&

}

function TaskRow({ t, done, onToggle }){
  const openable = String(t.cropId || "").indexOf("cal:") === 0 || String(t.cropId || "").indexOf("task:") === 0;
  const open = () => { if(openable && window.__hbOpenTask) window.__hbOpenTask(t); };
  return (
    <div className={"task" + (done ? " done" : "")}>
      <button className="chk" onClick={() => onToggle(t)} aria-label={done ? "もどす" : "できた"}>
        {done ? "✓" : ""}
      </button>
      <div className="body" onClick={open} style={openable ? {cursor:"pointer"} : null}>
        <div className="crop">{t.dateLabel ? t.dateLabel + "・" : ""}{t.cropName}{openable ? " ▸" : ""}</div>
        <div className="label">{t.label}</div>
      </div>
      {t.kind === "harvest" && <span className="tag harvest">収穫</span>}
      {t.kind === "water" && <span className="tag">水</span>}
      {t.kind === "custom" && <span className="tag">じぶん</span>}
      {t.kind === "cal" && <span className="tag">\ud83d\udcc6</span>}
    </div>
  );
}

function TodayView({ state, todayStr, weather, weatherErr, api }){
  const tasks = HB.tasksForDate(state, todayStr);
  const doneCount = tasks.filter(t => state.done[t.key]).length;
  const harvestNow = state.crops.filter(c => HB.isHarvestTime(c, todayStr));
  const overdue = HB.overdueTasks(state, todayStr, 14);
  return (
    <div>
      <WeatherCard weather={weather} error={weatherErr} />
      <section className="card">
        <h2>きょうの畑しごと<span className="n">{doneCount}/{tasks.length}</span></h2>
        {tasks.length === 0 && <div className="empty">今日の予定はありません。ゆっくりお休みください。🍵</div>}
        {tasks.map(t => (
          <TaskRow key={t.key} t={t} done={!!state.done[t.key]} onToggle={api.toggleTask} />
        ))}
        {tasks.length > 0 && doneCount === tasks.length &&
          <div className="alldone">🎉 今日のお仕事、ぜんぶ完了です。おつかれさまでした！</div>}
      </section>
      {overdue.length > 0 &&
        <section className="card">
          <h2>やり残しはありませんか<span className="n">この2週間</span></h2>
          <p className="note" style={{margin:"0 0 4px"}}>もう済んでいたら○を押してください。まだなら今日やってしまいましょう。</p>
          {overdue.map(t => (
            <TaskRow key={t.key} t={Object.assign({}, t, { dateLabel: HB.jpDateShort(t.date) })}
              done={false} onToggle={api.toggleTask} />
          ))}
        </section>}
      {harvestNow.length > 0 &&
        <section className="card">
          <h2>いま収穫どき 🧺</h2>
          {harvestNow.map(c => (
            <div className="task" key={c.id}>
              <div className="body">
                <div className="label">{c.name}<span className="badge">収穫どき</span></div>
              </div>
              <button className="btn accent small" onClick={() => api.openHarvest(c.id)}>収穫を記録</button>
            </div>
          ))}
        </section>
      }
      <button className="btn ghost" onClick={api.openDigest}>🤖 AIにそうだん（データをコピー）</button>
      <p className="note" style={{margin:"8px 4px 0"}}>
        押すと畑の記録の要約ができます。ChatGPTに貼り付けて相談できます。
      </p>
    </div>
  );
}
</script>

<script type="text/babel" data-presets="react" id="hb-ui2">
/* ---------- こよみ ---------- */
function CalendarView({ state, todayStr, api }){
  const t0 = HB.parseYmd(todayStr);
  const [ym, setYm] = useState({ y: t0.getFullYear(), m: t0.getMonth() });
  const [sel, setSel] = useState(todayStr);
  const move = d => setYm(({y, m}) => { const nd = new Date(y, m + d, 1); return { y: nd.getFullYear(), m: nd.getMonth() }; });
  const first = new Date(ym.y, ym.m, 1);
  const start = new Date(ym.y, ym.m, 1 - first.getDay());
  const cells = [];
  for(let i = 0; i < 42; i++){ const d = new Date(start); d.setDate(start.getDate() + i); cells.push(d); }
  const selTasks = HB.tasksForDate(state, sel);
  return (
    <div>
      <section className="card">
        <div className="calhead">
          <button onClick={() => move(-1)} aria-label="前の月">‹</button>
          <div className="ym">{ym.y}年 {ym.m + 1}月</div>
          <button onClick={() => move(1)} aria-label="次の月">›</button>
        </div>
        <div className="calgrid">
          {["日","月","火","水","木","金","土"].map((w, i) => (
            <div key={w} className={"dow" + (i === 0 ? " sun" : i === 6 ? " sat" : "")}>{w}</div>
          ))}
          {cells.map(d => {
            const ds = HB.ymd(d);
            const tasks = HB.tasksForDate(state, ds);
            const cls = "day"
              + (d.getMonth() !== ym.m ? " othermonth" : "")
              + (ds === todayStr ? " today" : "")
              + (ds === sel ? " sel" : "");
            return (
              <button key={ds} className={cls} onClick={() => setSel(ds)}>
                <span>{d.getDate()}</span>
                <span className="dots">
                  {tasks.slice(0, 3).map((t, i) => <i key={i} className={t.kind === "harvest" ? "harvest" : ""}></i>)}
                </span>
              </button>
            );
          })}
        </div>
      </section>
      <section className="card">
        <h2>{HB.jpDate(sel)} の予定<span className="n">{selTasks.length}件</span></h2>
        {selTasks.length === 0 && <div className="empty">この日の予定はありません。</div>}
        {selTasks.map(t => (
          <TaskRow key={t.key} t={t} done={!!state.done[t.key]} onToggle={api.toggleTask} />
        ))}
              <div style={{height:8}}></div>
        <button className="btn ghost small" onClick={() => api.addTaskFor(sel)}>＋ この日に予定を追加</button>
      </section>
    </div>
  );
}

/* ---------- はたけ(作物一覧) ---------- */
function CropsView({ state, todayStr, api }){
  const active = state.crops.filter(c => !c.closed);
  const closed = state.crops.filter(c => c.closed);
  const kabu = active.reduce((a, c) => a + (c.count || 1), 0);
  return (
    <div>
      <section className="card">
        <h2>育てている作物<span className="n">{active.length}件・{kabu}株</span></h2>
        {active.length === 0 &&
          <div className="empty">まだ登録がありません。下のボタンから最初の作物を登録しましょう。🌱</div>}
        {active.map(c => {
          const t = HB.DB[c.key] || {};
          const age = HB.daysBetween(c.planted, todayStr);
          return (
            <button key={c.id} className="crop-item" onClick={() => api.openCrop(c.id)}>
              <span className="thumb">{c.photo ? <img src={c.photo} alt="" /> : HB.stageEmoji(c, todayStr)}</span>
              <span>
                <span className="name">{c.name}</span>
                {(c.count || 1) > 1 &&
                  <span className="badge" style={{background:"#e2eeda", color:"var(--leaf-deep)"}}>×{c.count}株</span>}
                {HB.isHarvestTime(c, todayStr) && <span className="badge">収穫どき</span>}
                <div className="meta">{HB.jpDate(c.planted)} {t.basis || "植え付け"}・{age}日目</div>
              </span>
            </button>
          );
        })}
      </section>
      <button className="btn" onClick={api.openAddCrop}>＋ さくもつを登録する</button>
      {closed.length > 0 &&
        <section className="card" style={{marginTop:14}}>
          <h2>今季おわりにした作物<span className="n">{closed.length}件</span></h2>
          <p className="note" style={{margin:"0 0 4px"}}>予定は止まっています。押すと中を見られます（再開もできます）。</p>
          {closed.map(c => {
            const t = HB.DB[c.key] || {};
            return (
              <button key={c.id} className="crop-item" style={{opacity:.62}} onClick={() => api.openCrop(c.id)}>
                <span className="thumb">{c.photo ? <img src={c.photo} alt="" /> : (t.emoji || "🌱")}</span>
                <span>
                  <span className="name">{c.name}</span>
                  <span className="badge" style={{background:"#efe9da", color:"var(--muted)"}}>おわり</span>
                  <div className="meta">{HB.jpDate(c.planted)} {t.basis || "植え付け"}</div>
                </span>
              </button>
            );
          })}
        </section>}
    </div>
  );
}

function Sheet({ title, onClose, children }){
  return (
    <div className="overlay" onClick={e => { if(e.target === e.currentTarget) onClose(); }}>
      <div className="sheet">
        <button className="close" onClick={onClose} aria-label="とじる">✕</button>
        <h3>{title}</h3>
        {children}
      </div>
    </div>
  );
}

function CountStepper({ value, onChange }){
  /* 株数の入力。狭い画面(折りたたみスマホ)でも1列に収まるよう固定幅+折り返し禁止 */
  return (
    <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"nowrap"}}>
      <button className="btn gray small" style={{width:56, flex:"none"}}
        onClick={() => onChange(Math.max(1, value - 1))}>−</button>
      <input type="number" inputMode="numeric" min="1" value={value}
        style={{width:88, flex:"none", textAlign:"center"}}
        onChange={e => { const v = parseInt(e.target.value, 10); onChange(Number.isFinite(v) && v > 0 ? v : 1); }} />
      <button className="btn gray small" style={{width:56, flex:"none"}}
        onClick={() => onChange(value + 1)}>＋</button>
      <span style={{fontSize:15, fontWeight:700, color:"var(--muted)", flex:"none"}}>株</span>
    </div>
  );
}

function MaturitySelect({ value, onChange }){
  return (
    <select value={value} onChange={e => onChange(e.target.value)}>
      <option value="early">早生（はやく育つ品種）</option>
      <option value="normal">ふつう</option>
      <option value="late">晩生（ゆっくり育つ品種）</option>
    </select>
  );
}

function AddCropModal({ todayStr, onSave, onClose }){
  const [key, setKey] = useState("tomato");
  const [name, setName] = useState(HB.DB.tomato.name);
  const [date, setDate] = useState(todayStr);
  const [count, setCount] = useState(1);
  const [mat, setMat] = useState("normal");
  const t = HB.DB[key];
  const pick = k => { setKey(k); setName(HB.DB[k].name); };
  return (
    <Sheet title="さくもつを登録" onClose={onClose}>
      <label className="f">しゅるい</label>
      <select value={key} onChange={e => pick(e.target.value)}>
        {HB.CATS.map(cat => (
          <optgroup key={cat} label={cat}>
            {HB.DBKEYS.filter(k => HB.DB[k].cat === cat).map(k => (
              <option key={k} value={k}>{HB.DB[k].emoji} {HB.DB[k].name}</option>
            ))}
          </optgroup>
        ))}
      </select>
      <label className="f">よびな（自由に変えられます。例: トマト2本目）</label>
      <input type="text" value={name} onChange={e => setName(e.target.value)} />
      <label className="f">{t.basis}をした日</label>
      <input type="date" value={date} onChange={e => setDate(e.target.value)} />
      <label className="f">株数（苗やタネの本数。まとめて1件で管理できます）</label>
      <CountStepper value={count} onChange={setCount} />
      {!t.annual &&
        <div>
          <label className="f">そだちの早さ（苗の袋に「早生」「晩生」とあれば合わせてください）</label>
          <MaturitySelect value={mat} onChange={setMat} />
        </div>}
      {t.tip && <p className="note">💡 {t.tip}</p>}
      <div style={{height:12}}></div>
      <button className="btn" onClick={() => { if(!date) return; onSave(key, name.trim() || t.name, date, count, mat); }}>
        登録する
      </button>
    </Sheet>
  );
}

function CropDetailModal({ state, cropId, todayStr, api, onClose }){
  const c = state.crops.find(x => x.id === cropId);
  const fileRef = useRef(null);
  const [newNote, setNewNote] = useState("");
  const [cuDate, setCuDate] = useState(todayStr);
  const [cuLabel, setCuLabel] = useState("");
  if(!c) return null;
  const t = HB.DB[c.key] || {};
  const f = HB.factorOf(c);
  const age = HB.daysBetween(c.planted, todayStr);
  const up = HB.upcoming(state, todayStr, 60, c.id);
  const myHarvests = state.harvests.filter(h => h.cropId === c.id);
  const total = {};
  myHarvests.forEach(h => { total[h.unit] = (total[h.unit] || 0) + Number(h.qty || 0); });
  const customs = (c.custom || []).slice().sort((a, b) => a.date < b.date ? -1 : 1);
  const onPhoto = async e => {
    const f2 = e.target.files && e.target.files[0];
    if(!f2) return;
    try{
      const dataUrl = await HB.compressImage(f2, 640, 0.6);
      api.setCropPhoto(c.id, dataUrl);
    }catch(err){ api.say("写真を読み込めませんでした"); }
    e.target.value = "";
  };
  return (
    <Sheet title={(t.emoji || "🌱") + " " + c.name} onClose={onClose}>
      {c.closed &&
        <div className="banner warn" style={{marginTop:4}}>🍂 今季おわりにしています（予定は止まっています）。
          <button className="btn small" onClick={() => api.reopenCrop(c.id)}>再開</button></div>}
      {c.photo
        ? <img className="bigphoto" src={c.photo} alt={c.name} />
        : <div className="thumb" style={{width:"100%", height:140, fontSize:64}}>{HB.stageEmoji(c, todayStr)}</div>}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={onPhoto} />
      <div className="btnrow" style={{marginTop:10}}>
        <button className="btn ghost" onClick={() => fileRef.current && fileRef.current.click()}>📷 写真をとる</button>
        <button className="btn accent" onClick={() => api.openHarvest(c.id)}>🧺 収穫を記録</button>
      </div>

      <label className="f">{t.basis || "植え付け"}をした日（あとから直せます）</label>
      <input type="date" value={c.planted} onChange={e => e.target.value && api.setCropPlanted(c.id, e.target.value)} />

      <label className="f">株数（苗やタネの本数）</label>
      <CountStepper value={c.count || 1} onChange={n => api.setCropCount(c.id, n)} />

      {!t.annual &&
        <div>
          <label className="f">そだちの早さ（変えると予定の日どりも動きます）</label>
          <MaturitySelect value={c.maturity || "normal"} onChange={m => api.setCropMaturity(c.id, m)} />
        </div>}

      <div style={{marginTop:12}}>
        <div className="kv"><span>きょうで</span><b>{age}日目 {HB.isHarvestTime(c, todayStr) && <span className="badge">収穫どき</span>}</b></div>
        {t.harvest && <div className="kv"><span>収穫のめやす</span><b>{Math.round(t.harvest.from * f)}〜{Math.round(t.harvest.to * f)}日目ごろ</b></div>}
        {Object.keys(total).length > 0 &&
          <div className="kv"><span>これまでの収穫</span>
            <b>{Object.keys(total).map(u => total[u] + u).join("・")}</b></div>}
      </div>
      {t.tip && <p className="note">💡 {t.tip}</p>}

      <h3 style={{marginTop:16}}>これからの予定（60日先まで）</h3>
      <div className="evlist">
        {up.length === 0 && <div className="empty">水やり以外の予定はしばらくありません。</div>}
        {up.map((u, i) => <div key={i}>{HB.jpDateShort(u.date)}　{u.label}</div>)}
      </div>

      <h3 style={{marginTop:16}}>じぶんの予定を足す</h3>
      <p className="note" style={{margin:"0 0 4px"}}>「ネット張り」「草取り」など、自分で決めた作業を予定に入れられます。</p>
      <label className="f">いつ</label>
      <input type="date" value={cuDate} onChange={e => setCuDate(e.target.value)} />
      <label className="f">なにを</label>
      <input type="text" value={cuLabel} placeholder="例: 防鳥ネットを張る" onChange={e => setCuLabel(e.target.value)} />
      <div style={{height:8}}></div>
      <button className="btn ghost" onClick={() => {
        if(!cuDate || !cuLabel.trim()) return;
        api.addCustom(c.id, cuDate, cuLabel.trim()); setCuLabel("");
      }}>📌 予定に入れる</button>
      {customs.length > 0 &&
        <div className="evlist" style={{marginTop:8}}>
          {customs.map(u => (
            <div key={u.id} style={{display:"flex", alignItems:"center", gap:8}}>
              <span style={{flex:1}}>{HB.jpDateShort(u.date)}　{u.label}</span>
              <button className="btn gray small" onClick={() => api.removeCustom(c.id, u.id)}>消す</button>
            </div>
          ))}
        </div>}

      <h3 style={{marginTop:16}}>かんさつメモ（日づけつき）</h3>
      <textarea value={newNote} placeholder="気づいたことを何でも。AIそうだんにも渡ります。"
        style={{minHeight:72}} onChange={e => setNewNote(e.target.value)} />
      <div style={{height:8}}></div>
      <button className="btn ghost" onClick={() => {
        if(!newNote.trim()) return;
        api.addNote(c.id, newNote); setNewNote("");
      }}>📝 きょうのメモに残す</button>
      {(c.notes || []).length > 0 &&
        <div className="evlist" style={{marginTop:8}}>
          {c.notes.map(n => (
            <div key={n.id} style={{display:"flex", alignItems:"center", gap:8}}>
              <span style={{flex:1}}><b>{HB.jpDateShort(n.date)}</b>　{n.text}</span>
              <button className="btn gray small" onClick={() => {
                if(window.confirm("このメモを消しますか？")) api.removeNote(c.id, n.id);
              }}>消す</button>
            </div>
          ))}
        </div>}

      <div style={{height:14}}></div>
      {!c.closed &&
        <button className="btn gray" onClick={() => {
          if(window.confirm(c.name + " の予定を止めます（収穫やメモの記録は残ります）。来季また使うときは「再開」できます。よろしいですか？")) api.closeCrop(c.id);
        }}>🍂 今季おわりにする（予定を止める）</button>}
      <div style={{height:8}}></div>
      <button className="btn danger" onClick={() => {
        if(window.confirm(c.name + " を一覧から消します。収穫の記録は「きろく」に残ります。よろしいですか？")) api.removeCrop(c.id);
      }}>この作物を消す</button>
    </Sheet>
  );
}

function HarvestModal({ state, cropId, todayStr, onSave, onClose }){
  const c = state.crops.find(x => x.id === cropId);
  const t = c ? (HB.DB[c.key] || {}) : {};
  const [date, setDate] = useState(todayStr);
  const [qty, setQty] = useState("");
  const [unit, setUnit] = useState(t.unit || "個");
  if(!c) return null;
  const units = ["個","本","kg","g","袋","束","株","輪"];
  return (
    <Sheet title={"🧺 " + c.name + " の収穫"} onClose={onClose}>
      <label className="f">収穫した日</label>
      <input type="date" value={date} onChange={e => setDate(e.target.value)} />
      <label className="f">かず</label>
      <input type="number" inputMode="decimal" min="0" step="any" value={qty}
        placeholder="例: 5" onChange={e => setQty(e.target.value)} />
      <label className="f">たんい</label>
      <select value={unit} onChange={e => setUnit(e.target.value)}>
        {units.map(u => <option key={u} value={u}>{u}</option>)}
      </select>
      <div style={{height:12}}></div>
      <button className="btn accent" onClick={() => {
        const q = parseFloat(qty);
        if(!date || isNaN(q) || q <= 0) return;
        onSave(c, date, q, unit);
      }}>記録する</button>
    </Sheet>
  );
}
</script>

<script type="text/babel" data-presets="react" id="hb-ui3">
/* ---------- きろく(収穫のまとめ) ---------- */
function RecordsView({ state, todayStr, api }){
  const t0 = HB.parseYmd(todayStr);
  const [year, setYear] = useState(t0.getFullYear());
  const [cropSel, setCropSel] = useState("all");
  const cropOpts = []; const seen = {};
  state.harvests.forEach(h => { if(!seen[h.cropId]){ seen[h.cropId] = true; cropOpts.push({ id: h.cropId, name: h.cropName }); } });
  const months = Array.from({ length: 12 }, () => 0);
  state.harvests.forEach(h => {
    const d = HB.parseYmd(h.date);
    if(d.getFullYear() !== year) return;
    if(cropSel === "all") months[d.getMonth()] += 1;
    else if(h.cropId === cropSel) months[d.getMonth()] += Number(h.qty || 0);
  });
  let unitLabel = "回";
  if(cropSel !== "all"){
    const anyH = state.harvests.find(h => h.cropId === cropSel);
    unitLabel = anyH ? anyH.unit : "";
  }
  const max = Math.max(1, Math.max.apply(null, months));
  const totals = {};
  state.harvests.forEach(h => {
    const k = h.cropName + "|" + h.unit;
    totals[k] = (totals[k] || 0) + Number(h.qty || 0);
  });
  const recent = state.harvests.slice(-10).reverse();
  const nowM = (year === t0.getFullYear()) ? t0.getMonth() : -1;
  return (
    <div>
      <section className="card">
        <h2>収穫のようす（{year}年）</h2>
        <div className="btnrow" style={{marginBottom:8}}>
          <button className="btn gray small" style={{flex:1}} onClick={() => setYear(year - 1)}>‹ 前の年</button>
          <button className="btn gray small" style={{flex:1}} onClick={() => setYear(year + 1)}>次の年 ›</button>
        </div>
        <select value={cropSel} onChange={e => setCropSel(e.target.value)}>
          <option value="all">ぜんぶ（記録した回数）</option>
          {cropOpts.map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
        </select>
        <div className="chart">
          {months.map((v, i) => (
            <div key={i} className={"col" + (i === nowM ? " now" : "")}>
              <div className="v">{v > 0 ? Math.round(v * 10) / 10 : ""}</div>
              <div className="bar" style={{height: Math.round(v / max * 118) + 2}}></div>
              <div className="m">{i + 1}</div>
            </div>
          ))}
        </div>
        <div className="note" style={{textAlign:"right"}}>たての数字の単位: {unitLabel}</div>
        {Object.keys(totals).length > 0 &&
          <div className="totals">
            {Object.keys(totals).map(k => (
              <div key={k}><span>{k.split("|")[0]}</span><b>合計 {Math.round(totals[k] * 10) / 10}{k.split("|")[1]}</b></div>
            ))}
          </div>}
      </section>
      <section className="card">
        <h2>さいきんの記録<span className="n">直近10件</span></h2>
        {recent.length === 0 && <div className="empty">まだ収穫の記録がありません。「はたけ」の作物から記録できます。🧺</div>}
        {recent.map(h => (
          <div className="task" key={h.id}>
            <div className="body">
              <div className="crop">{HB.jpDate(h.date)}</div>
              <div className="label">{h.cropName}　{h.qty}{h.unit}</div>
            </div>
            <button className="btn gray small" onClick={() => {
              if(window.confirm("この記録を消しますか？")) api.removeHarvest(h.id);
            }}>消す</button>
          </div>
        ))}
      </section>
    </div>
  );
}

/* ---------- Drive自動保存カード ---------- */
function SyncCard({ state, api, syncing }){
  const sy = state.settings.sync || {};
  const [open, setOpen] = useState(false);
  let status = "未設定（下の「うら設定」からご家族が設定します）";

    status = sy.lastSync ? ("最終保存: " + HB.jpDate(HB.ymd(new Date(sy.lastSync)))) : "設定ずみ・まだ保存していません";

  return (
    <section className="card">
      <h2>Drive自動保存 ☁️</h2>
      <p className="note">畑の記録（写真以外）と今日の天気を、Google Driveの「畑日和」フォルダへ自動で届けます。ChatGPTの分析にも、もしもの時の控えにもなります。</p>
      <div className="kv"><span>ようす</span><b>{sy.lastError ? "⚠️ うまくいっていません" : status}</b></div>

      <div style={{height:8}}></div>

      <div style={{height:8}}></div>
      <button className="btn gray small" onClick={() => setOpen(!open)}>{open ? "うら設定をとじる" : "うら設定（ご家族用）"}</button>
      {open &&
        <div>
          <label className="f">受付係のURL（DRIVE_SETUP.md の手順で作成）</label>
          <input type="text" value={sy.url || ""} placeholder="https://script.google.com/macros/s/…/exec"

          <label className="f">あいことば（受付係の TOKEN と同じ文字列）</label>
          <input type="text" value={sy.token || ""} onChange={e => api.setSyncField("token", e.target.value.trim())} />
          <label className="f">この端末の役わり</label>
          <button className="btn ghost small" onClick={() => api.setSyncField("mode", (sy.mode || "send") === "send" ? "receive" : "send")}>
            {(sy.mode || "send") === "send" ? "本番（記録をDriveへ送る）" : "見るだけ（Driveから受け取る）"}
          </button>
          <label className="f">自動保存（開いた時と収穫記録のあと）</label>
          <button className="btn ghost small" onClick={() => api.setSyncField("auto", !(sy.auto !== false))}>
            {sy.auto !== false ? "自動保存は オン" : "自動保存は オフ"}
          </button>
          <label className="f">カレンダー連携（受付係v1.3が必要）</label>
          <button className="btn ghost small" onClick={() => api.setSyncField("calendar", !(sy.calendar !== false))}>
            {sy.calendar !== false ? "\ud83d\udcc6 カレンダーの農業予定を 表示中" : "\ud83d\udcc6 カレンダー連携は オフ"}
          </button>
          <div style={{height:8}}></div>
          <button className="btn ghost small" disabled={!sy.url} onClick={async () => {
            const link = window.location.origin + window.location.pathname + "#setup=" + HB.encodeSetup({ url: sy.url, token: sy.token, mode: "send" });
            try{ await navigator.clipboard.writeText(link); api.say("設定リンクをコピーしました。LINEで送って、その端末で開くだけです"); }
            catch(e){ window.prompt("このリンクをコピーしてください", link); }
          }}>🔗 設定リンクをコピー（別の端末に配る）</button>
          <div style={{height:8}}></div>
          <button className="btn ghost small" onClick={() => {
            if(window.confirm("この端末の表示を、Driveにある最新の記録に置きかえます（写真はこの端末のものを残します）。よろしいですか？")) api.pullNow(false);
          }}>⬇️ Driveから読み込む（復元・機種変のときに）</button>
        </div>}
    </section>
  );
}

/* ---------- じぶんの予定の編集 ---------- */
function TaskEditSheet({ state, taskId, isNew, api, onClose }){
  const tk = (state.tasks || []).find(x => x.id === taskId);
  const [date, setDate] = useState(tk ? tk.date : "");
  const [label, setLabel] = useState(tk ? tk.label : "");
  const [memo, setMemo] = useState(tk ? (tk.memo || "") : "");
  if(!tk) return null;
  const close = () => {
    if(isNew && !label.trim()) api.removeTaskQuiet(taskId);
    onClose();
  };
  return (
    <Sheet title={"\ud83d\udcdd じぶんの予定"} onClose={close}>
      <label className="f">日づけ</label>
      <input type="date" value={date} onChange={e => setDate(e.target.value)} />
      <label className="f">ないよう</label>
      <input type="text" value={label} placeholder="例: JAに肥料を注文" onChange={e => setLabel(e.target.value)} />
      <label className="f">メモ（なくてもOK）</label>
      <textarea value={memo} onChange={e => setMemo(e.target.value)} />
      <div style={{height:12}}></div>
      <button className="btn" onClick={() => {
        if(!date || !label.trim()) return;
        api.saveTask(taskId, { date: date, label: label.trim(), memo: memo });
        onClose(); api.say("予定を保存しました \ud83d\udcdd");
      }}>保存する</button>
      <div style={{height:8}}></div>
      <button className="btn danger" onClick={() => {
        if(window.confirm("この予定を消しますか？")) api.removeTask(taskId);
      }}>この予定を消す</button>
    </Sheet>
  );
}

<script type="text/babel" data-presets="react" id="hb-ui4">
/* ---------- 本体 ---------- */
function App(){
  const now = useNow();
  const todayStr = HB.ymd(now);
  const [state, setState] = useState(() => HB.load() || HB.defaultState());
  const [tab, setTab] = useState("today");
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState("");
  const [quotaWarn, setQuotaWarn] = useState(false);
  const [weather, setWeather] = useState(null);
  const [weatherErr, setWeatherErr] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const firstRun = useRef(true);
  const toastT = useRef(null);
  const stateRef = useRef(state);
  stateRef.current = state;

  const say = m => { setToast(m); clearTimeout(toastT.current); toastT.current = setTimeout(() => setToast(""), 2400); };
  const update = fn => setState(s => {
    const n = { ...s, crops: [...s.crops], harvests: [...s.harvests], done: { ...s.done },
                settings: { ...s.settings }, meta: { ...s.meta } };
    fn(n);
    return n;
  });

  /* 保存(自動)・音・天気 */
  useEffect(() => { HB.sound.on = state.settings.sound !== false; }, [state.settings.sound]);
  useEffect(() => {
    if(firstRun.current){ firstRun.current = false; return; }
    HB.saveDebounced(state, () => setQuotaWarn(true));
  }, [state]);
  useEffect(() => {
    const h = () => HB.saveNow(stateRef.current);
    window.addEventListener("pagehide", h);
    document.addEventListener("visibilitychange", h);
    return () => { window.removeEventListener("pagehide", h); document.removeEventListener("visibilitychange", h); };
  }, []);
  /* 設定リンク(#setup=…)で開かれたら、うら設定を自動で受け取る */
  useEffect(() => {
    const su = HB.decodeSetup(window.location.hash);
    if(!su) return;
    update(s => {
      s.settings.sync = Object.assign({}, HB.syncDefaults(), s.settings.sync || {}, su);
    });
    try{ history.replaceState(null, "", window.location.pathname + window.location.search); }catch(e){}
    say("設定を受け取りました 🔗");
  }, []);
  useEffect(() => {
    let dead = false;
    HB.fetchWeather()
      .then(d => { if(!dead){ setWeather(d); setWeatherErr(false); } })
      .catch(() => { if(!dead) setWeatherErr(true); });
    return () => { dead = true; };
  }, [todayStr]);
  useEffect(() => {
    const sy = (stateRef.current.settings.sync) || {};
    if(!(sy.url && sy.calendar !== false)) return;
    const cc = stateRef.current.calCache || {};
    if(cc.at && Date.now() - new Date(cc.at).getTime() < 3 * 3600 * 1000) return;
    fetch(sy.url, { method: "POST", body: JSON.stringify({ token: sy.token || "", action: "calendar", days: 180 }) })
      .then(r => r.json())
      .then(j => {
        if(j && j.ok && Array.isArray(j.events)){
          update(s => { s.calCache = { at: new Date().toISOString(), events: j.events.slice(0, 300) }; });
        }
      })
      .catch(() => {});
  }, [todayStr]);
  /* 天気が確定したら自動同期(多くても6時間に1回) */
  useEffect(() => {
    const sy = (stateRef.current.settings.sync) || {};
    if(!(sy.auto && sy.url)) return;
    if(weather === null && !weatherErr) return;
    const last = sy.lastSync ? new Date(sy.lastSync).getTime() : 0;
    if((sy.mode || "send") === "receive"){
      if(Date.now() - last < 10 * 60 * 1000) return;
      pullNow(true);
      return;
    }
    if(Date.now() - last < 6 * 3600 * 1000) return;
    syncNow(true);
  }, [weather, weatherErr]);

  /* バックアップ */
  const markBackedUp = () => update(s => { s.settings.lastBackup = new Date().toISOString(); });
  const backupPayload = () => JSON.stringify(HB.exportData(stateRef.current), null, 1);
  const downloadBackup = () => {
    const blob = new Blob([backupPayload()], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = HB.backupFilename();
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    markBackedUp(); say("バックアップを保存しました 💾");
  };
  const shareBackup = async () => {
    try{
      const file = new File([backupPayload()], HB.backupFilename(), { type: "application/json" });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], title: "畑日和の記録" });
        markBackedUp(); say("送りました 📤");
        return;
      }
    }catch(e){ if(e && e.name === "AbortError") return; }
    downloadBackup(); /* 共有が使えない環境ではファイル保存に切りかえ */
  };
  const importFile = e => {
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const r = HB.parseImport(String(reader.result));
      if(r.ok){
        if(window.confirm("いまの記録をバックアップの内容に置きかえます。よろしいですか？\n（念のため、置きかえ前の記録もファイルに保存します）")){
          downloadBackup();
          setState(r.state); say("バックアップから戻しました");
        }
      }else if(r.error === "legacy"){
        alert("これは新しい畑日和の形式ではないようです（旧・Claude版のバックアップかもしれません）。このファイルは引っ越し用に変換できます。家族に渡してください。");
      }else{
        alert("ファイルを読み込めませんでした。");
      }
    };
    reader.readAsText(f);
    e.target.value = "";
  };

  /* 作業・作物・収穫 */
  const toggleTask = t => {
    const cur = stateRef.current;
    const willDone = !cur.done[t.key];
    if(willDone){
      const dateStr = t.key.split("|")[1];
      const dayTasks = HB.tasksForDate(cur, dateStr);
      const remaining = dayTasks.filter(x => !cur.done[x.key] && x.key !== t.key).length;
      HB.sound.play(remaining === 0 ? "alldone" : "done");
    }
    update(s => {
      if(s.done[t.key]) delete s.done[t.key];
      else s.done[t.key] = { at: new Date().toISOString() };
    });
  };
  const addCrop = (key, name, planted, count, maturity) => {
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    update(s => { s.crops.push({
      id: id, key: key, name: name, planted: planted, photo: null, memo: "",
      count: Math.max(1, parseInt(count, 10) || 1), maturity: maturity || "normal",
      notes: [], custom: [], closed: false
    }); });
    HB.sound.play("pon"); setModal(null); say(name + " を登録しました 🌱");
  };
  const patchCrop = (id, patch) => update(s => {
    s.crops = s.crops.map(c => c.id === id ? Object.assign({}, c, patch) : c);
  });
  const setCropPhoto = (id, p) => { patchCrop(id, { photo: p }); say("写真を保存しました 📷"); };
  const setCropPlanted = (id, d) => patchCrop(id, { planted: d });
  const setCropMemo = (id, m) => patchCrop(id, { memo: m });
  const setCropCount = (id, n) => patchCrop(id, { count: Math.max(1, parseInt(n, 10) || 1) });
  const setCropMaturity = (id, m) => patchCrop(id, { maturity: m });
  const addNote = (id, text) => {
    update(s => { s.crops = s.crops.map(c => c.id === id
      ? Object.assign({}, c, { notes: [{ id: Date.now().toString(36), date: todayStr, text: String(text).trim() }].concat(c.notes || []) })
      : c); });
    say("メモを書きとめました 📝");
  };
  const removeNote = (id, nid) => update(s => {
    s.crops = s.crops.map(c => c.id === id ? Object.assign({}, c, { notes: (c.notes || []).filter(n => n.id !== nid) }) : c);
  });
  const addCustom = (id, date, label) => {
    update(s => { s.crops = s.crops.map(c => c.id === id
      ? Object.assign({}, c, { custom: (c.custom || []).concat([{ id: Date.now().toString(36), date: date, label: label }]) })
      : c); });
    HB.sound.play("pon"); say("予定に入れました 📌");
  };
  const removeCustom = (id, cid) => update(s => {
    s.crops = s.crops.map(c => c.id === id ? Object.assign({}, c, { custom: (c.custom || []).filter(x => x.id !== cid) }) : c);
  });
  const closeCrop = id => { patchCrop(id, { closed: true }); setModal(null); say("今季おわりにしました 🍂 記録は残っています"); };
  const reopenCrop = id => { patchCrop(id, { closed: false }); say("予定を再開しました 🌱"); };
  const removeCrop = id => { update(s => { s.crops = s.crops.filter(c => c.id !== id); }); setModal(null); say("一覧から消しました"); };
  const addHarvest = (c, date, qty, unit) => {
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    update(s => { s.harvests.push({ id: id, cropId: c.id, cropName: c.name, date: date, qty: qty, unit: unit }); });
    HB.sound.play("harvest"); setModal(null); say("収穫を記録しました 🧺");
    const sy = (stateRef.current.settings.sync) || {};
    if(sy.auto && sy.url && (sy.mode || "send") === "send") setTimeout(() => syncNow(true), 1500);
  };
  const removeHarvest = id => update(s => { s.harvests = s.harvests.filter(h => h.id !== id); });
  const toggleSound = () => {
    HB.sound.ensure();
    const wasOn = stateRef.current.settings.sound !== false;
    update(s => { s.settings.sound = !wasOn; });
    if(!wasOn){ HB.sound.on = true; HB.sound.play("pon"); }
  };

  /* Drive自動保存 */
  const setSyncField = (k, v) => update(s => {
    s.settings.sync = Object.assign({}, HB.syncDefaults(), s.settings.sync || {});
    s.settings.sync[k] = v;
  });
  const syncNow = async silent => {
    const sy = (stateRef.current.settings.sync) || {};
    if(!sy.url){ if(!silent) say("先に「うら設定」でURLとあいことばの設定が必要です"); return; }
    if(syncing) return;
    setSyncing(true);
    const built = HB.buildSyncPayload(stateRef.current, weather, todayStr);
    try{
      const res = await fetch(sy.url, { method: "POST", body: JSON.stringify(built.payload) });
      const j = await res.json();
      if(!(j && j.ok)) throw new Error((j && j.error) || "server");
      update(s => {
        s.settings.sync = Object.assign({}, s.settings.sync);
        const x = s.settings.sync;
        x.lastSync = new Date().toISOString(); x.lastError = null;
        x.sentHarvestIds = (x.sentHarvestIds || []).concat(built.sentIds).slice(-1000);
        if(built.dailyDate) x.lastDailyLogDate = built.dailyDate;
      });
      if(!silent) say("Driveに保存しました ☁️");
    }catch(e){
      update(s => {
        s.settings.sync = Object.assign({}, s.settings.sync);
        s.settings.sync.lastError = String((e && e.message) || e);
      });
      if(!silent) say("Drive保存に失敗しました。電波と設定を確認してください");
    }
    setSyncing(false);
  };
  const pullNow = async silent => {
    const sy = (stateRef.current.settings.sync) || {};
    if(!sy.url){ if(!silent) say("先に「うら設定」でURLとあいことばの設定が必要です"); return; }
    if(syncing) return;
    setSyncing(true);
    try{
      const res = await fetch(sy.url, { method: "POST", body: JSON.stringify({ token: sy.token || "", action: "load" }) });
      const j = await res.json();
      if(!(j && j.ok && j.data)) throw new Error((j && j.error) || "nodata");
      const merged = HB.mergePulled(stateRef.current, j.data);
      setState(merged);
      update(s => {
        s.settings.sync = Object.assign({}, s.settings.sync);
        s.settings.sync.lastSync = new Date().toISOString();
        s.settings.sync.lastError = null;
      });
      if(!silent) say("Driveから読み込みました ⬇️");
    }catch(e){
      update(s => {
        s.settings.sync = Object.assign({}, s.settings.sync);
        s.settings.sync.lastError = String((e && e.message) || e);
      });
      if(!silent) say("読み込みに失敗しました。設定と電波を確認してください");
    }
    setSyncing(false);
  };

  /* AIそうだん(要約づくり) */
  const digestText = () => {
    let wline = null;
    if(weather && weather.daily){
      const d = weather.daily;
      const w = HB.wmo(d.weather_code[0]);
      const p = d.precipitation_probability_max ? d.precipitation_probability_max[0] : null;
      wline = w.label + " 最高" + Math.round(d.temperature_2m_max[0]) + "℃/最低" +
              Math.round(d.temperature_2m_min[0]) + "℃" + (p != null ? " 降水確率" + p + "%" : "");
    }
    return HB.buildDigest(stateRef.current, todayStr, wline);
  };
  const copyDigest = async text => {
    try{ await navigator.clipboard.writeText(text); say("コピーしました。ChatGPTに貼り付けてください"); }
    catch(e){ say("コピーできませんでした。文章を長押しして選択してください"); }
  };
  const shareDigest = async text => {
    if(navigator.share){
      try{ await navigator.share({ text: text }); return; }
      catch(e){ if(e && e.name === "AbortError") return; }
    }
    copyDigest(text);
  };

  const sy = state.settings.sync || {};
  const syncFresh = sy.url && sy.lastSync &&
    (Date.now() - new Date(sy.lastSync).getTime()) / 86400000 < 30;
  const needBackup = state.crops.length > 0 && !syncFresh && (!state.settings.lastBackup ||
    (Date.now() - new Date(state.settings.lastBackup).getTime()) / 86400000 >= 30);
  const syncTrouble = sy.url && sy.auto && sy.lastError &&
    (!sy.lastSync || (Date.now() - new Date(sy.lastSync).getTime()) / 86400000 >= 3);

    /* じぶんの予定(独立)とカレンダー写し取り込み */
  const openTask = t => {
    if(String(t.cropId).indexOf("cal:") === 0) setModal({ t: "caltask", task: t });
    else if(String(t.cropId).indexOf("task:") === 0) setModal({ t: "edittask", id: t.taskId });
  };
  useEffect(() => {
    window.__hbOpenTask = openTask;
    return () => { if(window.__hbOpenTask === openTask) window.__hbOpenTask = null; };
  });
  const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const importCalTask = ct => {
    const id = newId();
    update(s => {
      s.tasks = (s.tasks || []).concat([{ id: id, date: ct.date, label: ct.label, memo: ct.memo || "", srcEventId: ct.evId }]);
      s.calImported = Object.assign({}, s.calImported || {});
      s.calImported[ct.evId] = true;
    });
    setModal({ t: "edittask", id: id });
    say("アプリに写しました。ここで自由に直せます ✏️");
  };
  const addTaskFor = date => {
    const id = newId();
    update(s => { s.tasks = (s.tasks || []).concat([{ id: id, date: date, label: "", memo: "", srcEventId: null }]); });
    setModal({ t: "edittask", id: id, isNew: true });
  };
  const saveTask = (id, patch) => update(s => {
    s.tasks = (s.tasks || []).map(x => x.id === id ? Object.assign({}, x, patch) : x);
  });
  const removeTaskQuiet = id => update(s => { s.tasks = (s.tasks || []).filter(x => x.id !== id); });
  const removeTask = id => { removeTaskQuiet(id); setModal(null); say("予定を消しました"); };

const api = {
    toggleTask, removeHarvest, say,
    openHarvest: id => setModal({ t: "harvest", id: id }),
    openCrop: id => setModal({ t: "crop", id: id }),
    openAddCrop: () => setModal({ t: "add" }),
    openDigest: () => setModal({ t: "digest" }),
    setCropPhoto, setCropPlanted, setCropMemo, removeCrop,
    setCropCount, setCropMaturity, addNote, removeNote,
    addCustom, removeCustom, closeCrop, reopenCrop,
    shareBackup, downloadBackup, importFile, toggleSound,
    syncNow, pullNow, setSyncField,
    openTask, importCalTask, addTaskFor, saveTask, removeTask, removeTaskQuiet
  };

  return (
    <div>
      <Sky now={now} />
      <main className="wrap">
        {!HB.storageOK &&
          <div className="banner danger">⚠️ この画面はお試し表示のため、記録が保存されません。本番のページ（GitHub Pages）でお使いください。</div>}
        {quotaWarn &&
          <div className="banner danger">⚠️ 保存がいっぱいです。「せってい」からバックアップを送って、古い写真を減らしてください。</div>}
        {syncTrouble &&
          <div className="banner warn">☁️ Driveへの保存がしばらくできていません。ご家族に伝えてください。</div>}
        {HB.storageOK && needBackup && tab !== "set" &&
          <div className="banner warn">🍀 しばらくバックアップをしていません。
            <button className="btn small" onClick={() => setTab("set")}>送る</button></div>}
        {tab === "today" && <TodayView state={state} todayStr={todayStr} weather={weather} weatherErr={weatherErr} api={api} />}
        {tab === "cal"   && <CalendarView state={state} todayStr={todayStr} api={api} />}
        {tab === "crops" && <CropsView state={state} todayStr={todayStr} api={api} />}
        {tab === "rec"   && <RecordsView state={state} todayStr={todayStr} api={api} />}
        {tab === "set"   && <SettingsView state={state} api={api} syncing={syncing} />}
        <div className="ver">畑日和 v{HB.VERSION}・記録はこのスマホの中に保存されます</div>
      </main>
      <nav className="tabs">
        {[["today","🏠","きょう"],["cal","📅","こよみ"],["crops","🌱","はたけ"],["rec","🧺","きろく"],["set","⚙️","せってい"]].map(a => (
          <button key={a[0]} className={tab === a[0] ? "on" : ""}
            onClick={() => { HB.sound.ensure(); setTab(a[0]); }}>
            <span className="ic">{a[1]}</span>{a[2]}
          </button>
        ))}
      </nav>
      {modal && modal.t === "add" &&
        <AddCropModal todayStr={todayStr} onSave={addCrop} onClose={() => setModal(null)} />}
      {modal && modal.t === "crop" &&
        <CropDetailModal state={state} cropId={modal.id} todayStr={todayStr} api={api} onClose={() => setModal(null)} />}
      {modal && modal.t === "harvest" &&
        <HarvestModal state={state} cropId={modal.id} todayStr={todayStr} onSave={addHarvest} onClose={() => setModal(null)} />}
      {modal && modal.t === "digest" &&
        <DigestModal text={digestText()} autoText={HB.buildAutomationText(state, todayStr, 90)} onCopy={copyDigest} onShare={shareDigest} onClose={() => setModal(null)} />}
      {modal && modal.t === "caltask" &&
        <CalTaskSheet task={modal.task} api={api} onClose={() => setModal(null)} />}
      {modal && modal.t === "edittask" &&
        <TaskEditSheet state={state} taskId={modal.id} isNew={!!modal.isNew} api={api} onClose={() => setModal(null)} />}
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
/* 読み込み失敗時の案内(古い端末・電波なし対策) */
setTimeout(function(){
  var r = document.getElementById("root");
  if(r && !r.firstChild){
    r.innerHTML = '<div style="padding:24px;font-size:18px;line-height:1.8;">読み込みがうまくいきませんでした。電波のあるところで、画面を下に引っぱって更新してみてください。</div>';
  }
}, 8000);
/* オフラインでも開けるように(sw.jsがある場合のみ) */
if("serviceWorker" in navigator && location.protocol === "https:"){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("./sw.js").catch(function(){});
  });
}
</script>
</body>
</html>
